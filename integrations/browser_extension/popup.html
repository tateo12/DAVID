<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=360" />
  <title>Sentinel AI Security</title>
  <style>
    /* ---- Reset & Base ---- */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 360px;
      height: 480px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
        'Helvetica Neue', Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      -webkit-font-smoothing: antialiased;
      overflow-y: auto;
      overflow-x: hidden;
    }

    /* ---- Header ---- */
    .header {
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      padding: 20px 24px 16px;
      border-bottom: 1px solid rgba(56, 189, 248, 0.15);
      text-align: center;
    }

    .header-logo {
      font-size: 28px;
      margin-bottom: 4px;
    }

    .header-title {
      font-size: 18px;
      font-weight: 700;
      color: #f8fafc;
      letter-spacing: 0.5px;
    }

    .header-subtitle {
      font-size: 11px;
      color: #64748b;
      font-weight: 500;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-top: 2px;
    }

    /* ---- Content Area ---- */
    .content {
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ---- Session Status ---- */
    .status-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      background: rgba(30, 41, 59, 0.7);
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status-dot.active {
      background: #22c55e;
      box-shadow: 0 0 8px rgba(34, 197, 94, 0.5);
      animation: pulse-dot 2s ease-in-out infinite;
    }

    .status-dot.inactive {
      background: #475569;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .status-label {
      font-size: 13px;
      font-weight: 600;
      color: #f1f5f9;
    }

    .status-label span {
      font-weight: 400;
      color: #94a3b8;
    }

    /* ---- Stats Grid ---- */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .stat-card {
      background: rgba(30, 41, 59, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 10px;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .stat-label {
      font-size: 10.5px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #64748b;
      font-weight: 600;
    }

    .stat-value {
      font-size: 22px;
      font-weight: 700;
      color: #f8fafc;
      line-height: 1.1;
    }

    .stat-value.danger {
      color: #f87171;
    }

    .stat-value.small-text {
      font-size: 13px;
      font-weight: 600;
    }

    .stat-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      width: fit-content;
    }

    .badge-low {
      background: rgba(34, 197, 94, 0.15);
      color: #4ade80;
      border: 1px solid rgba(34, 197, 94, 0.25);
    }

    .badge-medium {
      background: rgba(234, 179, 8, 0.15);
      color: #facc15;
      border: 1px solid rgba(234, 179, 8, 0.25);
    }

    .badge-high {
      background: rgba(239, 68, 68, 0.15);
      color: #f87171;
      border: 1px solid rgba(239, 68, 68, 0.25);
    }

    /* ---- Detections List ---- */
    .section-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #64748b;
      font-weight: 600;
      margin-bottom: -4px;
    }

    .detections-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .detection-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: rgba(30, 41, 59, 0.7);
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .detection-icon {
      font-size: 16px;
      flex-shrink: 0;
    }

    .detection-info {
      flex: 1;
      min-width: 0;
    }

    .detection-type {
      font-size: 12px;
      font-weight: 600;
      color: #f1f5f9;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .detection-time {
      font-size: 10.5px;
      color: #64748b;
    }

    .detection-severity {
      font-size: 9px;
      padding: 2px 7px;
      border-radius: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      flex-shrink: 0;
    }

    .sev-red {
      background: rgba(239, 68, 68, 0.15);
      color: #f87171;
    }

    .sev-yellow {
      background: rgba(234, 179, 8, 0.15);
      color: #facc15;
    }

    .empty-state {
      text-align: center;
      padding: 16px;
      color: #475569;
      font-size: 12px;
      font-style: italic;
    }

    /* ---- Buttons ---- */
    .actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 2px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.15s ease;
      text-decoration: none;
      width: 100%;
    }

    .btn-primary {
      background: linear-gradient(135deg, #2563eb, #3b82f6);
      color: #fff;
      box-shadow: 0 2px 8px rgba(37, 99, 235, 0.3);
    }

    .btn-primary:hover {
      background: linear-gradient(135deg, #1d4ed8, #2563eb);
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.4);
      transform: translateY(-1px);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.06);
      color: #94a3b8;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.1);
      color: #e2e8f0;
    }

    /* ---- Footer ---- */
    .footer {
      text-align: center;
      padding: 12px 20px 16px;
      font-size: 10.5px;
      color: #334155;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <div class="header-logo">&#x1f6e1;&#xfe0f;</div>
    <div class="header-title">Sentinel</div>
    <div class="header-subtitle">AI Security Supervisor</div>
  </div>

  <!-- Content -->
  <div class="content">
    <!-- Session Status -->
    <div class="status-row">
      <div class="status-dot active" id="status-dot"></div>
      <div class="status-label" id="status-label">Session Active</div>
    </div>

    <!-- Stats Grid -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Prompts Scanned</div>
        <div class="stat-value" id="stat-prompts">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-threats">0</div>
        <div class="stat-label">Threats Detected</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Current Page</div>
        <div class="stat-value small-text" id="stat-tool">--</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Risk Level</div>
        <div id="stat-risk">
          <span class="stat-badge badge-low">Low</span>
        </div>
      </div>
    </div>

    <!-- Recent Detections -->
    <div class="section-title">Recent Detections</div>
    <div class="detections-list" id="detections-list">
      <div class="empty-state" id="empty-detections">No detections this session</div>
    </div>

    <!-- Actions -->
    <div class="actions">
      <button class="btn btn-primary" id="btn-dashboard">
        <span>&#x1f4ca;</span> Open Dashboard
      </button>
      <button class="btn btn-secondary" id="btn-clear">
        <span>&#x1f5d1;&#xfe0f;</span> Clear Session
      </button>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">Sentinel v1.0.0</div>

  <script src="popup.js"></script>
</body>
</html>
