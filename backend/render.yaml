services:
  - type: web
    name: sentinel-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ALLOWED_ORIGINS
        value: "https://www.sentinel-ai-security.com,https://sentinel-ai-security.com,http://localhost:3000"
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_SITE_URL
        value: "https://sentinel-ai-security.com"
      - key: DATABASE_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: ENABLE_L2
        value: "true"
      - key: ENABLE_L3
        value: "true"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: SENTINEL_INITIAL_ADMIN_USERNAME
        sync: false
      - key: SENTINEL_INITIAL_ADMIN_PASSWORD
        sync: false
